# meta/terminology.yaml
#
# Канонічна термінологія Наказу МОУ № 402. Реєстр включає:
#  • current     — нинішні форми, які мають вживатися в нових редакціях
#  • deprecated  — застарілі форми + наказ-амендмент, який їх замінив
#
# Лінтер драфтів попереджає, якщо new_text / text операції містить
# застарілий термін без явного контексту цитування.

deprecated_terms:
  - term: "аеромобільні"
    replace_with: "Десантно-штурмові"
    since_order: "524"
    since_date: 2014-08-12
    note: >-
      У 2014 наказом № 524 «аеромобільні» було замінено на «високомобільні
      десантні», а далі у 2023 наказом № 457 — на «Десантно-штурмові».

  - term: "високомобільні десантні"
    replace_with: "Десантно-штурмові"
    since_order: "457"
    since_date: 2023-08-08

  - term: "внутрішні війська"
    replace_with: "Національна гвардія"
    since_order: "524"
    since_date: 2014-08-12

  - term: "Головний військово-медичний клінічний центр"
    replace_with: "Національний військово-медичний клінічний центр"
    since_order: "193"
    since_date: 2017-03-29
    note: >-
      Заміна як повної назви, так і скорочення «ГВМКЦ» → «НВМКЦ».

  - term: "ГВМКЦ"
    replace_with: "НВМКЦ"
    since_order: "193"
    since_date: 2017-03-29

  - term: "виключений"
    replace_with: "виключено"
    since_order: null
    since_date: null
    note: >-
      У формальному стилі НПА вживається безособова форма «виключено»,
      не дієприкметник «виключений».
