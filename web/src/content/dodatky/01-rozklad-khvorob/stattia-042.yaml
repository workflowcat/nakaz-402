# dodatky/01-rozklad-khvorob/stattia-042.yaml
#
# Демонстраційна стаття Розкладу хвороб (клас I00-I99 — Хвороби системи
# кровообігу), артеріальна гіпертензія.
# УВАГА: значення категорій придатності — ілюстративні. Перед застосуванням
# звірте з офіційним текстом на rada.gov.ua.

id: dodatok.1.stattia.42
stattia: 42
klas: I00-I99
nazva: "Хвороби, які характеризуються підвищеним кров'яним тиском (артеріальна гіпертензія)"
short_nazva: "Артеріальна гіпертензія"

source: https://zakon.rada.gov.ua/laws/show/z1109-08
status: active
last_amended:
  date: 2024-04-27
  order: z0616-24
amended_by:
  - { date: 2023-08-18, order: z1467-23, op: edit }
  - { date: 2024-04-27, order: z0616-24, op: redaction }

punkty:

  - id: "а"
    opys: >-
      зі значним порушенням функції «органів-мішеней» (нирок, серця, мозку,
      очей), стійко високими цифрами АТ
    grafy:
      I: Д
      II: Д
      III: Д
      IV: Д

  - id: "б"
    opys: >-
      з помірним порушенням функції «органів-мішеней», АТ стабільно
      підвищений, потребує постійної медикаментозної корекції
    grafy:
      I: В
      II: В
      III: В
      IV: В

  - id: "в"
    opys: >-
      з незначним порушенням функції «органів-мішеней», АТ контролюється
      постійним прийомом гіпотензивних препаратів
    grafy:
      I: Б-4
      II: Б-4
      III: Б-3
      IV: Б

  - id: "г"
    opys: >-
      нейроциркуляторна дистонія за гіпертонічним типом без ураження
      «органів-мішеней»
    grafy:
      I: Б-3
      II: Б-3
      III: А
      IV: Б

references:
  poyasnennia: dodatok.2#stattia-42
  tdv: dodatok.3   # ТДВ для льотного складу — окремі вимоги до АТ
  related_statti:
    - dodatok.1.stattia.43   # Інші хвороби серця
    - dodatok.1.stattia.44   # Гіпотонічні стани
