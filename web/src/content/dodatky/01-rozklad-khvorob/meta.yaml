# dodatky/01-rozklad-khvorob/meta.yaml
#
# Схема статті Розкладу хвороб. Цим файлом валідуються всі stattia-NNN.yaml.
# Структура — для людини; формальний JSON Schema можна згенерувати потім.

# Категорії придатності, які можуть стояти в графах.
# Точні дефініції — див. Пояснення (Додаток 2).
katehorii:
  А: "Придатний до військової служби"
  А-1: "Придатний до військової служби (без обмежень)"
  Б: "Придатний з незначними обмеженнями"
  Б-1: "Придатний до більшості видів служби"
  Б-2: "Придатний до окремих видів служби"
  Б-3: "Придатний до служби в окремих видах ЗС"
  Б-4: "Придатний до служби з обмеженнями за видом"
  В: "Обмежено придатний (в особливий період — обмежено)"
  Г: "Тимчасово непридатний"
  Д: "Непридатний"

# Перелік граф у Розкладі хвороб.
grafy:
  I:
    label: "Графа I"
    audience: "Призовники"
    notes: >-
      Заповнюється при призові на строкову військову службу.
  II:
    label: "Графа II"
    audience: "Військовослужбовці строкової служби, курсанти ВВНЗ"
  III:
    label: "Графа III"
    audience: "Військовослужбовці контрактної служби, офіцери"
  IV:
    label: "Графа IV"
    audience: "Особи на контракт; військовозобов'язані"

# Класи хвороб (МКХ-10-сумісне групування), за якими статті групуються.
# Кожна стаття належить рівно одному класу.
klasy:
  - id: A00-B99
    nazva: "Інфекційні та паразитарні хвороби"
    statti_range: "1-12"   # приблизно
  - id: C00-D48
    nazva: "Новоутворення"
  - id: D50-D89
    nazva: "Хвороби крові, кровотворних органів та порушення з боку імунітету"
  - id: E00-E90
    nazva: "Хвороби ендокринної системи, розладів харчування та обміну речовин"
  - id: F00-F99
    nazva: "Розлади психіки та поведінки"
  - id: G00-G99
    nazva: "Хвороби нервової системи"
  - id: H00-H59
    nazva: "Хвороби ока та його придаткового апарату"
  - id: H60-H95
    nazva: "Хвороби вуха та соскоподібного відростка"
  - id: I00-I99
    nazva: "Хвороби системи кровообігу"
  - id: J00-J99
    nazva: "Хвороби органів дихання"
  - id: K00-K93
    nazva: "Хвороби органів травлення"
  - id: L00-L99
    nazva: "Хвороби шкіри та підшкірної клітковини"
  - id: M00-M99
    nazva: "Хвороби кістково-м'язової системи та сполучної тканини"
  - id: N00-N99
    nazva: "Хвороби сечостатевої системи"
  - id: Q00-Q99
    nazva: "Вроджені аномалії, деформації та хромосомні порушення"
  - id: S00-T98
    nazva: "Наслідки травм, отруєнь та інших дій зовнішніх чинників"

# Шаблон stattia-NNN.yaml.
stattia_schema:
  required: [id, stattia, klas, nazva, punkty]
  fields:
    id:
      type: string
      pattern: "^dodatok\\.1\\.stattia\\.\\d+$"
      example: "dodatok.1.stattia.1"
    stattia:
      type: integer
      min: 1
    klas:
      type: string
      enum_from: klasy.id
    nazva:
      type: string
    punkty:
      type: list
      items:
        required: [id, opys, grafy]
        fields:
          id: { type: string, pattern: "^[а-яіїєґ]$", example: "а" }
          opys: { type: string }
          grafy:
            type: map
            keys: [I, II, III, IV]
            values:
              type: string
              enum_from: katehorii
