title: "Наказ МОУ № 402"
description: "Машино-читабельна git-редакція Наказу Міністерства оборони України № 402 (військово-лікарська експертиза). Stable IDs, історія амендментів, інструменти аналізу."
lang: uk
url: "https://workflowcat.github.io"
baseurl: "/nakaz-402"

# Власний layout, без сторонніх тем
# (раніше було remote_theme: just-the-docs/just-the-docs — прибрано)

# Базові плагіни GH Pages
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Версія наказу — підставляється у layout
nakaz:
  number: "402"
  ministry: "Міністерство оборони України"
  signed_at: "2008-08-14"
  registration: "z1109-08"
  current_redaction: "2025-08-22"

# Не публікуємо в збірці
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .gitignore
  - .github/
  - README.md
  - CONTRIBUTING.md
  - LICENSE
  - Makefile
  - scripts/
  - "*.py"

include:
  - "dodatky/01-rozklad-khvorob/*.yaml"
  - "meta/*.yaml"

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  toc_levels: 2..3

# Permalink — без розширень .html (cleaner URLs)
permalink: pretty

# Collections — для структурування контенту
collections: {}

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"
