{% comment %}
  Глобальні кастомізації:
  - favicon + theme color
  - link на скомпільовану таблицю стилів /assets/css/site.css
  - JS: glossary tooltips + amendment freshness highlighting
{% endcomment %}

<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="mask-icon" href="{{ '/favicon.svg' | relative_url }}" color="#7253ed">
<meta name="theme-color" content="#7253ed">

<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">

<script>
// ── Glossary tooltips ──
(function() {
  const G = {
    'ЦВЛК': 'Центральна військово-лікарська комісія',
    'ТЦК та СП': 'Територіальний центр комплектування та соціальної підтримки',
    'ВЛК ВМС': 'Військово-лікарська комісія Військово-Морських Сил',
    'НВМКЦ': 'Національний військово-медичний клінічний центр',
    'ВМКЦ': 'Військово-медичний клінічний центр',
    'ВВНЗ': 'Вищі військові навчальні заклади',
    'ВЛК': 'Військово-лікарська комісія',
    'ВЛЕ': 'Військово-лікарська експертиза',
    'ЛЛК': 'Лікарсько-льотна комісія',
    'ЛЛЕ': 'Лікарсько-льотна експертиза',
    'ТДВ': 'Таблиці додаткових вимог до стану здоровʼя',
    'ТЦК': 'Територіальний центр комплектування',
    'МОУ': 'Міністерство оборони України',
    'МОЗ': 'Міністерство охорони здоровʼя України',
    'ДССТ': 'Державна спеціальна служба транспорту',
    'НГУ': 'Національна гвардія України',
    'ДПСУ': 'Державна прикордонна служба України',
    'ССО': 'Сили спеціальних операцій',
    'ДШВ': 'Десантно-штурмові війська',
    'ЗСУ': 'Збройні Сили України',
    'ПТК': 'Приймально-технічна комісія',
    'УПР': 'Управління повітряним рухом',
    'БпАК': 'Безпілотні авіаційні комплекси',
    'НПА': 'Нормативно-правовий акт',
    'РХ': 'Розклад хвороб',
  };
  const terms = Object.keys(G).sort((a, b) => b.length - a.length);
  const esc = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  let regex;
  try {
    regex = new RegExp('(?<![\\p{L}\\p{N}])(' + esc.join('|') + ')(?![\\p{L}\\p{N}])', 'gu');
  } catch (e) {
    regex = new RegExp('(' + esc.join('|') + ')', 'g');
  }
  const SKIP = new Set(['A','ABBR','CODE','PRE','SCRIPT','STYLE','TEXTAREA','INPUT','BUTTON','NAV','HEADER','FOOTER']);
  function skip(node) {
    let p = node.parentElement;
    while (p && p !== document.body) {
      if (SKIP.has(p.tagName)) return true;
      if (p.classList?.contains('no-glossary') || p.classList?.contains('site-nav')) return true;
      p = p.parentElement;
    }
    return false;
  }
  function processNode(node) {
    if (skip(node)) return;
    const text = node.nodeValue;
    if (!text || text.length < 3) return;
    regex.lastIndex = 0;
    if (!regex.test(text)) return;
    regex.lastIndex = 0;
    const frag = document.createDocumentFragment();
    let last = 0, m;
    while ((m = regex.exec(text))) {
      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const a = document.createElement('abbr');
      a.title = G[m[1]];
      a.textContent = m[1];
      frag.appendChild(a);
      last = m.index + m[1].length;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  }
  function run() {
    if (!document.body) return;
    const w = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
    const nodes = [];
    let n;
    while ((n = w.nextNode())) nodes.push(n);
    nodes.forEach(processNode);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();

// ── Amendment marker freshness — додаємо data-year на blockquote з посиланнями zNNNN-YY ──
(function() {
  function run() {
    const yearRe = /z\d{3,5}-(\d{2})/g;
    document.querySelectorAll('blockquote').forEach(bq => {
      const matches = [...bq.textContent.matchAll(yearRe)];
      if (!matches.length) return;
      bq.classList.add('amend-marker');
      let maxY = 0;
      matches.forEach(m => {
        const yy = parseInt(m[1], 10);
        const full = yy >= 80 ? 1900 + yy : 2000 + yy;
        if (full > maxY) maxY = full;
      });
      bq.dataset.year = maxY;

      if (maxY >= 2024) {
        let prev = bq.previousElementSibling;
        while (prev && !/^H[23]$/.test(prev.tagName || '')) prev = prev.previousElementSibling;
        if (prev && !prev.querySelector('.freshness-badge')) {
          const badge = document.createElement('span');
          badge.className = 'freshness-badge y-' + maxY;
          badge.textContent = maxY + ' ✦';
          badge.title = 'Пункт змінено у ' + maxY + ' році';
          prev.appendChild(badge);
        }
      }
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();
</script>
