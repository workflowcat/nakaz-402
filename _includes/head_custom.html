{% comment %}
  Глобальні style-кастомізації:
  1. Favicon і theme color.
  2. Кольорове кодування блок-цитат з маркерами амендментів за роком наказу.
  3. Бейдж свіжості біля заголовків нещодавно змінених пунктів.
  4. Glossary tooltips — авто-розпізнавання абревіатур.
{% endcomment %}

<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="mask-icon" href="{{ '/favicon.svg' | relative_url }}" color="#7253ed">
<meta name="theme-color" content="#7253ed">

<style>
  /* Маркер амендменту — блок-цитата з посиланням на zNNNN-YY */
  blockquote.amend-marker {
    font-size: 0.85rem;
    border-left: 3px solid #c8c8c8;
    background: var(--code-background-color, #fafafa);
    padding: 0.45rem 0.8rem;
    margin: 0.5rem 0;
    color: var(--body-text-color);
    opacity: 0.85;
  }
  blockquote.amend-marker[data-year="2025"] {
    border-left-color: #e07c3e;
    background: #fff5ec;
  }
  blockquote.amend-marker[data-year="2024"] {
    border-left-color: #c09c54;
    background: #fcf6e8;
  }
  blockquote.amend-marker[data-year="2023"] {
    border-left-color: #8a9aa8;
  }
  blockquote.amend-marker em {
    font-style: normal;
  }
  blockquote.amend-marker a[href*="zakon.rada.gov.ua/laws/show/z"] {
    font-family: var(--mono-font-family, monospace);
    font-size: 0.78rem;
  }

  /* Свіжість для всього абзацу, що містить нещодавно змінений маркер */
  .punkt-fresh-2025 { background: linear-gradient(90deg, rgba(224, 124, 62, 0.06), transparent 40%); }
  .punkt-fresh-2024 { background: linear-gradient(90deg, rgba(192, 156, 84, 0.04), transparent 40%); }

  /* Бейдж року біля заголовку пункту */
  .freshness-badge {
    display: inline-block;
    margin-left: 0.5rem;
    font-size: 0.7rem;
    padding: 1px 6px;
    border-radius: 8px;
    vertical-align: middle;
    font-family: var(--mono-font-family, monospace);
  }
  .freshness-badge.y-2025 { background: #fde6c8; color: #8a5a1a; }
  .freshness-badge.y-2024 { background: #f0e8d4; color: #6a5018; }

  /* Glossary tooltips — підкреслюємо абревіатури точечним підкресленням */
  abbr[title] {
    text-decoration: underline dotted;
    text-decoration-color: #b9a8e8;
    text-decoration-thickness: 1px;
    text-underline-offset: 3px;
    cursor: help;
    border: none;
  }
  abbr[title]:hover {
    text-decoration-color: #7253ed;
    background: rgba(114, 83, 237, 0.06);
  }
</style>

<script>
// === Glossary tooltips ===
(function() {
  const GLOSSARY = {
    'ЦВЛК': 'Центральна військово-лікарська комісія',
    'ТЦК та СП': 'Територіальний центр комплектування та соціальної підтримки',
    'ВЛК ВМС': 'Військово-лікарська комісія Військово-Морських Сил',
    'НВМКЦ': 'Національний військово-медичний клінічний центр',
    'ВМКЦ': 'Військово-медичний клінічний центр',
    'ВВНЗ': 'Вищі військові навчальні заклади',
    'ВЛК': 'Військово-лікарська комісія',
    'ВЛЕ': 'Військово-лікарська експертиза',
    'ЛЛК': 'Лікарсько-льотна комісія',
    'ЛЛЕ': 'Лікарсько-льотна експертиза',
    'ТДВ': 'Таблиці додаткових вимог до стану здоровʼя',
    'ТЦК': 'Територіальний центр комплектування',
    'МОУ': 'Міністерство оборони України',
    'МОЗ': 'Міністерство охорони здоровʼя України',
    'ДССТ': 'Державна спеціальна служба транспорту',
    'НГУ': 'Національна гвардія України',
    'ДПСУ': 'Державна прикордонна служба України',
    'ССО': 'Сили спеціальних операцій',
    'ДШВ': 'Десантно-штурмові війська',
    'ЗСУ': 'Збройні Сили України',
    'ПТК': 'Приймально-технічна комісія',
    'УПР': 'Управління повітряним рухом',
    'БпАК': 'Безпілотні авіаційні комплекси',
    'НПА': 'Нормативно-правовий акт',
    'РХ': 'Розклад хвороб',
  };

  // Сортуємо за довжиною спадаюче — щоб «ТЦК та СП» матчилось перед «ТЦК»
  const terms = Object.keys(GLOSSARY).sort((a, b) => b.length - a.length);
  const escaped = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  let regex;
  try {
    regex = new RegExp(
      '(?<![\\p{L}\\p{N}])(' + escaped.join('|') + ')(?![\\p{L}\\p{N}])',
      'gu'
    );
  } catch (e) {
    // Старі браузери без Unicode lookbehind — fallback без бордерів
    regex = new RegExp('(' + escaped.join('|') + ')', 'g');
  }

  const SKIP = new Set(['A', 'ABBR', 'CODE', 'PRE', 'SCRIPT', 'STYLE',
                         'TEXTAREA', 'INPUT', 'BUTTON', 'NAV', 'HEADER',
                         'FOOTER', 'AUDIO', 'VIDEO']);

  function shouldSkip(node) {
    let p = node.parentElement;
    while (p && p !== document.body) {
      if (SKIP.has(p.tagName)) return true;
      if (p.classList && (p.classList.contains('no-glossary') ||
                          p.classList.contains('site-nav') ||
                          p.classList.contains('breadcrumb-nav'))) return true;
      p = p.parentElement;
    }
    return false;
  }

  function processTextNode(node) {
    if (shouldSkip(node)) return;
    const text = node.nodeValue;
    if (!text || text.length < 3) return;
    regex.lastIndex = 0;
    if (!regex.test(text)) return;
    regex.lastIndex = 0;

    const frag = document.createDocumentFragment();
    let lastIdx = 0, match;
    while ((match = regex.exec(text)) !== null) {
      const term = match[1];
      const matchStart = match.index;
      if (matchStart > lastIdx) {
        frag.appendChild(document.createTextNode(text.slice(lastIdx, matchStart)));
      }
      const abbr = document.createElement('abbr');
      abbr.title = GLOSSARY[term];
      abbr.textContent = term;
      frag.appendChild(abbr);
      lastIdx = matchStart + term.length;
    }
    if (lastIdx < text.length) {
      frag.appendChild(document.createTextNode(text.slice(lastIdx)));
    }
    node.parentNode.replaceChild(frag, node);
  }

  function applyGlossary() {
    if (!document.body) return;
    const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
    const nodes = [];
    let n;
    while (n = walker.nextNode()) nodes.push(n);
    nodes.forEach(processTextNode);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyGlossary);
  } else {
    applyGlossary();
  }
})();

// === Amendment marker styling + freshness badges ===
(function() {
  function applyFreshness() {
    // 1. Знайти всі blockquote, що мають у текстовому вмісті посилання на наказ
    //    у форматі zNNNN-YY (наш стандарт реєстрації Мін'юсту).
    const yearRegex = /z\d{3,5}-(\d{2})/g;
    document.querySelectorAll('blockquote').forEach(bq => {
      const matches = [...bq.textContent.matchAll(yearRegex)];
      if (matches.length === 0) return;
      bq.classList.add('amend-marker');
      // Беремо найновіший рік серед посилань — він репрезентативний.
      let maxYear = 0;
      matches.forEach(m => {
        const yy = parseInt(m[1], 10);
        const full = yy >= 80 ? 1900 + yy : 2000 + yy;
        if (full > maxYear) maxYear = full;
      });
      bq.dataset.year = maxYear;

      // 2. Підсвітити батьківський punkt (h2/h3) свіжістю.
      if (maxYear >= 2024) {
        // знайти найближчий заголовок вище — h2 або h3
        let prev = bq.previousElementSibling;
        let head = null;
        while (prev) {
          if (prev.tagName && /^H[23]$/.test(prev.tagName)) { head = prev; break; }
          prev = prev.previousElementSibling;
        }
        if (head && !head.querySelector('.freshness-badge')) {
          const badge = document.createElement('span');
          badge.className = 'freshness-badge y-' + maxYear;
          badge.textContent = maxYear + ' ✦';
          badge.title = 'Цей пункт змінено у ' + maxYear + ' році';
          head.appendChild(badge);
        }
      }
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyFreshness);
  } else {
    applyFreshness();
  }
})();
</script>
