{% comment %}
  Глобальні кастомізації:
  - favicon + theme color
  - link на скомпільовану таблицю стилів /assets/css/site.css
  - JS: glossary tooltips + amendment freshness highlighting
{% endcomment %}

<link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
<link rel="mask-icon" href="{{ '/favicon.svg' | relative_url }}" color="#7253ed">
<meta name="theme-color" content="#7253ed">

<link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">

{% if page.wide %}
<style>
  /* WIDE LAYOUT — для інструмент-сторінок (/, /changes/, /diff/) */
  .side-bar { display: none !important; }
  .main { margin-left: 0 !important; max-width: 100% !important; }
  .main-content-wrap { max-width: 1400px !important; margin: 0 auto; padding-left: 2.25rem !important; padding-right: 2.25rem !important; }
  .main-content { max-width: 100% !important; }
  .main-header {
    max-width: 1400px;
    margin: 0 auto;
    padding-left: 2.25rem;
    padding-right: 2.25rem;
  }
  /* Тонка верхня nav-стрічка для wide-сторінок */
  .wide-topnav {
    display: flex;
    gap: 1.4rem;
    align-items: center;
    padding: 0.65rem 0;
    margin: 0 0 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
  }
  .wide-topnav .wn-brand {
    font-weight: 600;
    letter-spacing: -0.01em;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    text-decoration: none;
    color: var(--body-text-color);
    margin-right: auto;
  }
  .wide-topnav .wn-brand-mark {
    display: inline-block;
    width: 22px;
    height: 22px;
    background: var(--accent);
    border-radius: 5px;
    color: white;
    font-size: 0.62rem;
    font-weight: 700;
    text-align: center;
    line-height: 22px;
    letter-spacing: -0.5px;
  }
  .wide-topnav a:not(.wn-brand) {
    color: var(--body-text-color);
    opacity: 0.72;
    text-decoration: none;
    transition: opacity 0.12s;
  }
  .wide-topnav a:not(.wn-brand):hover { opacity: 1; color: var(--accent); }
  .wide-topnav a.wn-active { opacity: 1; color: var(--accent); }
  @media (max-width: 760px) {
    .main-content-wrap { padding-left: 1rem !important; padding-right: 1rem !important; }
    .wide-topnav { gap: 1rem; flex-wrap: wrap; font-size: 0.82rem; }
  }
</style>
{% endif %}

<script>
// ── Glossary tooltips ──
(function() {
  const G = {
    'ЦВЛК': 'Центральна військово-лікарська комісія',
    'ТЦК та СП': 'Територіальний центр комплектування та соціальної підтримки',
    'ВЛК ВМС': 'Військово-лікарська комісія Військово-Морських Сил',
    'НВМКЦ': 'Національний військово-медичний клінічний центр',
    'ВМКЦ': 'Військово-медичний клінічний центр',
    'ВВНЗ': 'Вищі військові навчальні заклади',
    'ВЛК': 'Військово-лікарська комісія',
    'ВЛЕ': 'Військово-лікарська експертиза',
    'ЛЛК': 'Лікарсько-льотна комісія',
    'ЛЛЕ': 'Лікарсько-льотна експертиза',
    'ТДВ': 'Таблиці додаткових вимог до стану здоровʼя',
    'ТЦК': 'Територіальний центр комплектування',
    'МОУ': 'Міністерство оборони України',
    'МОЗ': 'Міністерство охорони здоровʼя України',
    'ДССТ': 'Державна спеціальна служба транспорту',
    'НГУ': 'Національна гвардія України',
    'ДПСУ': 'Державна прикордонна служба України',
    'ССО': 'Сили спеціальних операцій',
    'ДШВ': 'Десантно-штурмові війська',
    'ЗСУ': 'Збройні Сили України',
    'ПТК': 'Приймально-технічна комісія',
    'УПР': 'Управління повітряним рухом',
    'БпАК': 'Безпілотні авіаційні комплекси',
    'НПА': 'Нормативно-правовий акт',
    'РХ': 'Розклад хвороб',
  };
  const terms = Object.keys(G).sort((a, b) => b.length - a.length);
  const esc = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  let regex;
  try {
    regex = new RegExp('(?<![\\p{L}\\p{N}])(' + esc.join('|') + ')(?![\\p{L}\\p{N}])', 'gu');
  } catch (e) {
    regex = new RegExp('(' + esc.join('|') + ')', 'g');
  }
  const SKIP = new Set(['A','ABBR','CODE','PRE','SCRIPT','STYLE','TEXTAREA','INPUT','BUTTON','NAV','HEADER','FOOTER']);
  function skip(node) {
    let p = node.parentElement;
    while (p && p !== document.body) {
      if (SKIP.has(p.tagName)) return true;
      if (p.classList?.contains('no-glossary') || p.classList?.contains('site-nav')) return true;
      p = p.parentElement;
    }
    return false;
  }
  function processNode(node) {
    if (skip(node)) return;
    const text = node.nodeValue;
    if (!text || text.length < 3) return;
    regex.lastIndex = 0;
    if (!regex.test(text)) return;
    regex.lastIndex = 0;
    const frag = document.createDocumentFragment();
    let last = 0, m;
    while ((m = regex.exec(text))) {
      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const a = document.createElement('abbr');
      a.title = G[m[1]];
      a.textContent = m[1];
      frag.appendChild(a);
      last = m.index + m[1].length;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  }
  function run() {
    if (!document.body) return;
    const w = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT);
    const nodes = [];
    let n;
    while ((n = w.nextNode())) nodes.push(n);
    nodes.forEach(processNode);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();

// ── Auto-link внутрішніх посилань на пункти ──
// Шукає в тексті патерни типу "пунктом 1.2", "у пункті 2.5", "за главою 2"
// і робить їх клікабельними, якщо в цій же сторінці є відповідний якір.
(function() {
  function run() {
    const main = document.querySelector('.main-content');
    if (!main) return;
    // Збираємо всі наявні якорі p1.1, p2.5 тощо
    const knownAnchors = new Set();
    main.querySelectorAll('a[id^="p"]').forEach(a => knownAnchors.add(a.id.slice(1)));
    if (knownAnchors.size === 0) return;

    // Регекс: «пункт», «у пункті», «за пунктом», «п.»
    // — Ukrainian inflections + numeric pattern N or N.M or N.M.K
    const PUNKT_RE = /\b(пункт(?:ом|у|а|і|и|ів)?|п\.)\s*(\d+(?:\.\d+){0,2})/g;

    const SKIP = new Set(['A','ABBR','CODE','PRE','SCRIPT','STYLE','BUTTON','SUMMARY']);
    function inside(node) {
      let p = node.parentElement;
      while (p && p !== main) {
        if (SKIP.has(p.tagName)) return true;
        if (p.classList && (p.classList.contains('amend-history') || p.classList.contains('chapter-context'))) return true;
        p = p.parentElement;
      }
      return false;
    }

    const walker = document.createTreeWalker(main, NodeFilter.SHOW_TEXT);
    const nodes = [];
    let n;
    while ((n = walker.nextNode())) nodes.push(n);

    nodes.forEach(node => {
      if (inside(node)) return;
      const text = node.nodeValue;
      if (!text || text.length < 5) return;
      PUNKT_RE.lastIndex = 0;
      if (!PUNKT_RE.test(text)) return;
      PUNKT_RE.lastIndex = 0;

      const frag = document.createDocumentFragment();
      let last = 0, m;
      let replaced = false;
      while ((m = PUNKT_RE.exec(text)) !== null) {
        const punktNum = m[2];
        if (!knownAnchors.has(punktNum)) continue;
        if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
        const a = document.createElement('a');
        a.href = '#p' + punktNum;
        a.className = 'xref';
        a.title = 'Перейти до пункту ' + punktNum;
        a.textContent = m[0];
        frag.appendChild(a);
        last = m.index + m[0].length;
        replaced = true;
      }
      if (!replaced) return;
      if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      node.parentNode.replaceChild(frag, node);
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();

// ── Chapter mini-TOC ──
// Будує collapsible TOC угорі сторінки + (на великих екранах) також
// плаваючу sticky-панель справа всередині main-content.
(function() {
  function run() {
    const main = document.querySelector('.main-content');
    if (!main) return;
    const anchors = main.querySelectorAll('a[id^="p"]');
    if (anchors.length < 3) return;

    const items = [];
    anchors.forEach(a => {
      const id = a.id;
      let next = a.nextElementSibling;
      while (next && !/^H[2-4]$/.test(next.tagName || '')) {
        next = next.nextElementSibling;
        if (!next || next.classList?.contains('amend-history')) break;
      }
      if (!next || !/^H[2-4]$/.test(next.tagName || '')) {
        const parent = a.parentElement;
        if (parent && /^H[2-4]$/.test(parent.tagName)) next = parent;
      }
      const text = next ? next.textContent.replace(/^\s*\W*\s*/, '').trim() : id;
      const level = next && next.tagName === 'H3' ? 'h3' : 'h2';
      items.push({ id, text, level });
    });

    if (items.length === 0) return;

    // Inline collapsible TOC угорі сторінки
    const inline = document.createElement('details');
    inline.className = 'chapter-toc-inline no-glossary';
    inline.innerHTML = `
      <summary>📍 Пункти в цій главі <span class="ctoc-count">${items.length}</span></summary>
      <ul>
        ${items.map(i => `<li class="ctoc-${i.level}"><a href="#${i.id}">${i.text}</a></li>`).join('')}
      </ul>
    `;
    // Вставити після amend-history (якщо є) або chapter-context, або як перший
    const ah = main.querySelector('.amend-history');
    const cc = main.querySelector('.chapter-context');
    const after = ah || cc;
    if (after && after.nextSibling) {
      after.parentNode.insertBefore(inline, after.nextSibling);
    } else {
      // як останній варіант — після h1
      const h1 = main.querySelector('h1');
      if (h1 && h1.nextSibling) h1.parentNode.insertBefore(inline, h1.nextSibling);
      else main.prepend(inline);
    }

    // Active highlight on scroll — навіть якщо TOC закритий
    const links = inline.querySelectorAll('a');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const id = e.target.id;
          links.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + id));
        }
      });
    }, { rootMargin: '-15% 0px -70% 0px' });
    anchors.forEach(a => observer.observe(a));
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();

// ── Flash-підсвітка при переході по якорю ──
(function() {
  function flash() {
    const hash = decodeURIComponent(location.hash || '').slice(1);
    if (!hash) return;
    const a = document.getElementById(hash);
    if (!a) return;
    // Шукаємо найближчий h2/h3 нижче (або батьківський, якщо <a> вкладений)
    let target = null;
    let next = a.nextElementSibling;
    while (next && next.tagName) {
      if (/^H[2-4]$/.test(next.tagName)) { target = next; break; }
      if (next.classList?.contains('amend-history') || next.tagName === 'A') break;
      next = next.nextElementSibling;
    }
    if (!target) {
      const par = a.parentElement;
      if (par && /^H[2-4]$/.test(par.tagName)) target = par;
    }
    if (!target) return;
    target.classList.add('xref-flash');
    setTimeout(() => target.classList.remove('xref-flash'), 1800);
  }
  window.addEventListener('hashchange', flash);
  window.addEventListener('load', flash);
})();

// ── Amendment marker freshness — додаємо data-year на blockquote з посиланнями zNNNN-YY ──
(function() {
  function run() {
    const yearRe = /z\d{3,5}-(\d{2})/g;
    document.querySelectorAll('blockquote').forEach(bq => {
      const matches = [...bq.textContent.matchAll(yearRe)];
      if (!matches.length) return;
      bq.classList.add('amend-marker');
      let maxY = 0;
      matches.forEach(m => {
        const yy = parseInt(m[1], 10);
        const full = yy >= 80 ? 1900 + yy : 2000 + yy;
        if (full > maxY) maxY = full;
      });
      bq.dataset.year = maxY;

      if (maxY >= 2024) {
        let prev = bq.previousElementSibling;
        while (prev && !/^H[23]$/.test(prev.tagName || '')) prev = prev.previousElementSibling;
        if (prev && !prev.querySelector('.freshness-badge')) {
          const badge = document.createElement('span');
          badge.className = 'freshness-badge y-' + maxY;
          badge.textContent = maxY + ' ✦';
          badge.title = 'Пункт змінено у ' + maxY + ' році';
          prev.appendChild(badge);
        }
      }
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();
</script>
