<script>
// =============================================================
// Theme toggle (light / dark / auto)
// =============================================================
(function() {
  const root = document.documentElement;
  const btn = document.querySelector('.theme-toggle');
  if (!btn) return;

  function applyTheme(mode) {
    if (mode === 'dark') root.classList.add('theme-dark');
    else if (mode === 'light') root.classList.remove('theme-dark');
    else { // auto
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      root.classList.toggle('theme-dark', prefersDark);
    }
  }

  btn.addEventListener('click', () => {
    const cur = localStorage.getItem('theme');
    const next = cur === 'dark' ? 'light' : (cur === 'light' ? 'auto' : 'dark');
    if (next === 'auto') localStorage.removeItem('theme'); else localStorage.setItem('theme', next);
    applyTheme(next || 'auto');
  });

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (!localStorage.getItem('theme')) applyTheme('auto');
  });
})();

// =============================================================
// Mobile nav drawer
// =============================================================
(function() {
  const toggle = document.querySelector('.mobile-menu-toggle');
  const drawer = document.getElementById('mobile-nav');
  if (!toggle || !drawer) return;
  toggle.addEventListener('click', () => {
    const isOpen = !drawer.hidden;
    drawer.hidden = isOpen;
    toggle.setAttribute('aria-expanded', String(!isOpen));
    document.body.style.overflow = !isOpen ? 'hidden' : '';
  });
  drawer.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
    drawer.hidden = true;
    document.body.style.overflow = '';
    toggle.setAttribute('aria-expanded', 'false');
  }));
})();

// =============================================================
// Search overlay
// =============================================================
(function() {
  const trigger = document.querySelector('.search-trigger');
  const overlay = document.getElementById('search-overlay');
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  if (!trigger || !overlay || !input || !results) return;

  // Index: формується з усіх Liquid-збираних page-метаданих
  const INDEX = window.__SITE_INDEX__ || [];

  function open() {
    overlay.hidden = false;
    document.body.style.overflow = 'hidden';
    setTimeout(() => input.focus(), 30);
  }
  function close() {
    overlay.hidden = true;
    document.body.style.overflow = '';
    input.value = '';
    render('');
  }

  function render(q) {
    q = q.trim().toLowerCase();
    if (!q) {
      results.innerHTML = '<p class="search-hint">Друкуй, щоб знайти. <kbd>↑</kbd><kbd>↓</kbd> — навігація, <kbd>↵</kbd> — відкрити, <kbd>Esc</kbd> — закрити.</p>';
      return;
    }
    const matched = INDEX.map(item => {
      const hay = (item.title + ' ' + item.desc + ' ' + (item.id || '')).toLowerCase();
      // Простий scoring: title hit > desc hit > id hit
      let score = 0;
      if (item.title.toLowerCase().includes(q)) score += 10;
      if (hay.includes(q)) score += 3;
      const tokens = q.split(/\s+/);
      tokens.forEach(t => { if (hay.includes(t)) score += 1; });
      return { item, score };
    }).filter(x => x.score > 0).sort((a, b) => b.score - a.score).slice(0, 25);

    if (matched.length === 0) {
      results.innerHTML = '<p class="search-empty">Нічого не знайдено.</p>';
      return;
    }
    results.innerHTML = '<ul class="search-list">' + matched.map((x, i) => `
      <li class="search-item ${i === 0 ? 'active' : ''}">
        <a href="${x.item.url}">
          <span class="si-title">${x.item.title}</span>
          ${x.item.id ? `<span class="si-id">${x.item.id}</span>` : ''}
          ${x.item.desc ? `<span class="si-desc">${x.item.desc}</span>` : ''}
        </a>
      </li>
    `).join('') + '</ul>';
  }

  trigger.addEventListener('click', open);
  document.addEventListener('keydown', e => {
    if (e.key === '/' && !e.target.matches('input,textarea')) { e.preventDefault(); open(); }
    if (e.key === 'Escape' && !overlay.hidden) close();
    // ↑↓ navigation у результатах
    if (!overlay.hidden && (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'Enter')) {
      const items = Array.from(results.querySelectorAll('.search-item'));
      if (!items.length) return;
      let idx = items.findIndex(i => i.classList.contains('active'));
      if (idx < 0) idx = 0;
      if (e.key === 'Enter') {
        e.preventDefault();
        items[idx].querySelector('a').click();
        return;
      }
      if (e.key === 'ArrowDown') idx = Math.min(items.length - 1, idx + 1);
      else idx = Math.max(0, idx - 1);
      items.forEach((it, i) => it.classList.toggle('active', i === idx));
      e.preventDefault();
    }
  });
  document.querySelectorAll('[data-search-close]').forEach(el => el.addEventListener('click', close));
  input.addEventListener('input', e => render(e.target.value));
})();

// =============================================================
// Glossary tooltips (auto-wrap абревіатур)
// =============================================================
(function() {
  const G = {
    'ЦВЛК': 'Центральна військово-лікарська комісія',
    'ТЦК та СП': 'Територіальний центр комплектування та соціальної підтримки',
    'ВЛК ВМС': 'Військово-лікарська комісія Військово-Морських Сил',
    'НВМКЦ': 'Національний військово-медичний клінічний центр',
    'ВМКЦ': 'Військово-медичний клінічний центр',
    'ВВНЗ': 'Вищі військові навчальні заклади',
    'ВЛК': 'Військово-лікарська комісія',
    'ВЛЕ': 'Військово-лікарська експертиза',
    'ЛЛК': 'Лікарсько-льотна комісія',
    'ЛЛЕ': 'Лікарсько-льотна експертиза',
    'ТДВ': 'Таблиці додаткових вимог до стану здоровʼя',
    'ТЦК': 'Територіальний центр комплектування',
    'МОУ': 'Міністерство оборони України',
    'МОЗ': 'Міністерство охорони здоровʼя України',
    'ДССТ': 'Державна спеціальна служба транспорту',
    'НГУ': 'Національна гвардія України',
    'ДПСУ': 'Державна прикордонна служба України',
    'ССО': 'Сили спеціальних операцій',
    'ДШВ': 'Десантно-штурмові війська',
    'ЗСУ': 'Збройні Сили України',
    'ПТК': 'Приймально-технічна комісія',
    'УПР': 'Управління повітряним рухом',
    'БпАК': 'Безпілотні авіаційні комплекси',
    'НПА': 'Нормативно-правовий акт',
    'РХ': 'Розклад хвороб',
  };
  const terms = Object.keys(G).sort((a, b) => b.length - a.length);
  const esc = terms.map(t => t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  let regex;
  try { regex = new RegExp('(?<![\\p{L}\\p{N}])(' + esc.join('|') + ')(?![\\p{L}\\p{N}])', 'gu'); }
  catch (e) { regex = new RegExp('(' + esc.join('|') + ')', 'g'); }
  const SKIP = new Set(['A','ABBR','CODE','PRE','SCRIPT','STYLE','TEXTAREA','INPUT','BUTTON','NAV','HEADER','FOOTER','SUMMARY']);
  function skip(node) {
    let p = node.parentElement;
    while (p && p !== document.body) {
      if (SKIP.has(p.tagName)) return true;
      if (p.classList?.contains('no-glossary') || p.classList?.contains('primary-nav') || p.classList?.contains('search-list')) return true;
      p = p.parentElement;
    }
    return false;
  }
  function processNode(node) {
    if (skip(node)) return;
    const text = node.nodeValue;
    if (!text || text.length < 3) return;
    regex.lastIndex = 0;
    if (!regex.test(text)) return;
    regex.lastIndex = 0;
    const frag = document.createDocumentFragment();
    let last = 0, m;
    while ((m = regex.exec(text))) {
      if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
      const a = document.createElement('abbr');
      a.title = G[m[1]];
      a.textContent = m[1];
      frag.appendChild(a);
      last = m.index + m[1].length;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    node.parentNode.replaceChild(frag, node);
  }
  function run() {
    const target = document.querySelector('.site-main') || document.body;
    const w = document.createTreeWalker(target, NodeFilter.SHOW_TEXT);
    const nodes = [];
    let n;
    while ((n = w.nextNode())) nodes.push(n);
    nodes.forEach(processNode);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();

// =============================================================
// Auto-link cross-references до пунктів (на цій же сторінці)
// =============================================================
(function() {
  function run() {
    const main = document.querySelector('.site-main');
    if (!main) return;
    const knownAnchors = new Set();
    main.querySelectorAll('a[id^="p"]').forEach(a => knownAnchors.add(a.id.slice(1)));
    if (knownAnchors.size === 0) return;
    const PUNKT_RE = /\b(пункт(?:ом|у|а|і|и|ів)?|п\.)\s*(\d+(?:\.\d+){0,2})/g;
    const SKIP = new Set(['A','ABBR','CODE','PRE','SCRIPT','STYLE','BUTTON','SUMMARY']);
    function inside(node) {
      let p = node.parentElement;
      while (p && p !== main) {
        if (SKIP.has(p.tagName)) return true;
        if (p.classList && (p.classList.contains('amend-history') || p.classList.contains('chapter-context'))) return true;
        p = p.parentElement;
      }
      return false;
    }
    const walker = document.createTreeWalker(main, NodeFilter.SHOW_TEXT);
    const nodes = [];
    let n;
    while ((n = walker.nextNode())) nodes.push(n);
    nodes.forEach(node => {
      if (inside(node)) return;
      const text = node.nodeValue;
      if (!text || text.length < 5) return;
      PUNKT_RE.lastIndex = 0;
      if (!PUNKT_RE.test(text)) return;
      PUNKT_RE.lastIndex = 0;
      const frag = document.createDocumentFragment();
      let last = 0, m, replaced = false;
      while ((m = PUNKT_RE.exec(text)) !== null) {
        const punktNum = m[2];
        if (!knownAnchors.has(punktNum)) continue;
        if (m.index > last) frag.appendChild(document.createTextNode(text.slice(last, m.index)));
        const a = document.createElement('a');
        a.href = '#p' + punktNum;
        a.className = 'xref';
        a.title = 'Перейти до пункту ' + punktNum;
        a.textContent = m[0];
        frag.appendChild(a);
        last = m.index + m[0].length;
        replaced = true;
      }
      if (!replaced) return;
      if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      node.parentNode.replaceChild(frag, node);
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();

// =============================================================
// Chapter in-page TOC (collapsible)
// =============================================================
(function() {
  function run() {
    const main = document.querySelector('.site-main');
    if (!main) return;
    const anchors = main.querySelectorAll('a[id^="p"]');
    if (anchors.length < 3) return;

    const items = [];
    anchors.forEach(a => {
      const id = a.id;
      let next = a.nextElementSibling;
      while (next && !/^H[2-4]$/.test(next.tagName || '')) {
        next = next.nextElementSibling;
        if (!next || next.classList?.contains('amend-history')) break;
      }
      if (!next || !/^H[2-4]$/.test(next.tagName || '')) {
        const parent = a.parentElement;
        if (parent && /^H[2-4]$/.test(parent.tagName)) next = parent;
      }
      const text = next ? next.textContent.trim() : id;
      const level = next && next.tagName === 'H3' ? 'h3' : 'h2';
      items.push({ id, text, level });
    });
    if (!items.length) return;

    const toc = document.createElement('details');
    toc.className = 'chapter-toc no-glossary';
    toc.innerHTML = `
      <summary>
        <span class="toc-icon" aria-hidden="true">▸</span>
        Пункти в цій главі
        <span class="toc-count">${items.length}</span>
      </summary>
      <ul>
        ${items.map(i => `<li class="toc-${i.level}"><a href="#${i.id}">${i.text}</a></li>`).join('')}
      </ul>
    `;
    const ah = main.querySelector('.amend-history');
    const cc = main.querySelector('.chapter-context');
    const after = ah || cc;
    if (after && after.nextSibling) after.parentNode.insertBefore(toc, after.nextSibling);
    else (main.querySelector('h1') || main.firstElementChild).insertAdjacentElement('afterend', toc);

    const links = toc.querySelectorAll('a');
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          links.forEach(l => l.classList.toggle('active', l.getAttribute('href') === '#' + e.target.id));
        }
      });
    }, { rootMargin: '-15% 0px -70% 0px' });
    anchors.forEach(a => observer.observe(a));
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();

// =============================================================
// Flash при переході по якорю
// =============================================================
(function() {
  function flash() {
    const hash = decodeURIComponent(location.hash || '').slice(1);
    if (!hash) return;
    const a = document.getElementById(hash);
    if (!a) return;
    let target = null;
    let next = a.nextElementSibling;
    while (next && next.tagName) {
      if (/^H[2-4]$/.test(next.tagName)) { target = next; break; }
      if (next.classList?.contains('amend-history') || next.tagName === 'A') break;
      next = next.nextElementSibling;
    }
    if (!target) {
      const par = a.parentElement;
      if (par && /^H[2-4]$/.test(par.tagName)) target = par;
    }
    if (!target) return;
    target.classList.add('xref-flash');
    setTimeout(() => target.classList.remove('xref-flash'), 1800);
  }
  window.addEventListener('hashchange', flash);
  window.addEventListener('load', flash);
})();

// =============================================================
// Amendment marker styling — додаємо data-year на blockquote
// =============================================================
(function() {
  function run() {
    const yearRe = /z\d{3,5}-(\d{2})/g;
    document.querySelectorAll('.site-main blockquote').forEach(bq => {
      const matches = [...bq.textContent.matchAll(yearRe)];
      if (!matches.length) return;
      bq.classList.add('amend-marker');
      let maxY = 0;
      matches.forEach(m => {
        const yy = parseInt(m[1], 10);
        const full = yy >= 80 ? 1900 + yy : 2000 + yy;
        if (full > maxY) maxY = full;
      });
      bq.dataset.year = maxY;
      if (maxY >= 2024) {
        let prev = bq.previousElementSibling;
        while (prev && !/^H[23]$/.test(prev.tagName || '')) prev = prev.previousElementSibling;
        if (prev && !prev.querySelector('.freshness-badge')) {
          const badge = document.createElement('span');
          badge.className = 'freshness-badge y-' + maxY;
          badge.textContent = maxY;
          badge.title = 'Пункт змінено у ' + maxY + ' році';
          prev.appendChild(badge);
        }
      }
    });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', run);
  else run();
})();
</script>

<!-- Index для search: збираємо всі сторінки з frontmatter title -->
<script>
window.__SITE_INDEX__ = [
{%- for p in site.html_pages -%}
  {%- if p.title and p.url != "/404.html" -%}
  { url: "{{ p.url | relative_url }}", title: {{ p.title | jsonify }}, desc: {{ p.description | default: '' | jsonify }}, id: {{ p.id | default: '' | jsonify }} },
  {%- endif -%}
{%- endfor -%}
];
</script>
