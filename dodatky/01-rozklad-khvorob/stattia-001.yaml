# dodatky/01-rozklad-khvorob/stattia-001.yaml
#
# Демонстраційна заповнена стаття Розкладу хвороб у форматі YAML.
#
# УВАГА: значення категорій придатності в цій статті — ілюстративні
# (типові для статей про туберкульоз, але НЕ є точною копією чинної редакції).
# Перед використанням у будь-яких рішеннях звірте з офіційним текстом на
# https://zakon.rada.gov.ua/laws/show/z1109-08.

id: dodatok.1.stattia.1
stattia: 1
klas: A00-B99
nazva: "Туберкульоз органів дихання"
short_nazva: "Туберкульоз"

source: https://zakon.rada.gov.ua/laws/show/z1109-08
status: active
last_amended:
  date: 2023-08-18
  order: z1467-23
amended_by:
  - { date: 2023-08-18, order: z1467-23, op: edit }

punkty:

  - id: "а"
    opys: >-
      активний прогресуючий, із поширенням процесу та явищами
      легенево-серцевої недостатності
    grafy:
      I: Д
      II: Д
      III: Д
      IV: Д

  - id: "б"
    opys: >-
      активний обмежений, із сповільненою динамікою процесу;
      стани після оперативного лікування з повним приживленням
    grafy:
      I: В
      II: В
      III: Б-4
      IV: В

  - id: "в"
    opys: >-
      клінічно вилікуваний, із залишковими змінами, які не порушують
      функцію зовнішнього дихання
    grafy:
      I: Б-3
      II: Б-3
      III: А
      IV: Б

  - id: "г"
    opys: >-
      тимчасові функціональні розлади після завершеного основного
      курсу лікування активної форми
    grafy:
      I: Г
      II: Г
      III: Г
      IV: Г

# Перехресні посилання на пояснення в Додатку 2.
references:
  poyasnennia: dodatok.2#stattia-1
  tdv: dodatok.3   # окремі вимоги для льотного складу, парашутистів тощо
